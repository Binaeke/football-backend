<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      background: transparent;
    }

    /* 🏟️ Stadium background */
    .stadium-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at center, rgba(0,255,100,0.08), transparent 60%),
        linear-gradient(to bottom, #0b3d1f, #071a10);
      animation: lights 4s infinite;
      z-index: 0;
    }

    @keyframes lights {
      0% { opacity: 0.85; }
      50% { opacity: 1; }
      100% { opacity: 0.85; }
    }

    /* 🎥 Scoreboard */
    .scoreboard {
      position: absolute;
      top: 25px;
      left: 25px;
      display: flex;
      align-items: center;
      background: rgba(15, 15, 15, 0.85);
      padding: 12px 18px;
      border-radius: 14px;
      color: white;
      min-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      z-index: 2;
    }

    .team {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .score {
      font-size: 34px;
      font-weight: 800;
      margin: 0 15px;
      color: #00ff88;
      letter-spacing: 2px;
      transition: 0.2s;
    }

    .status {
      position: absolute;
      top: 75px;
      left: 25px;
      font-size: 13px;
      color: #aaa;
      background: rgba(0,0,0,0.6);
      padding: 5px 10px;
      border-radius: 8px;
      z-index: 2;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #clock {
      color: #00ff88;
      font-weight: bold;
    }

    .live {
      color: #ff2e2e;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body>

<div class="stadium-bg"></div>

<div class="scoreboard">
  <div class="team" id="home">—</div>
  <div class="score" id="score">0 - 0</div>
  <div class="team" id="away">—</div>
</div>

<div class="status">
  <span id="clock">0'</span>
  <span id="status">LOADING</span>
  <span class="live">● LIVE</span>
</div>

<script>
let lastScore = "";
let lastValidData = null;
let isUpdating = false;

/* ⚽ REAL CLOCK BASED ON KICKOFF */
function updateClock(kickoffTime) {
  const now = new Date();
  let diff = Math.floor((now - kickoffTime) / 60000);

  if (diff < 0) {
    document.getElementById("clock").innerText = "0'";
  } else if (diff <= 90) {
    document.getElementById("clock").innerText = diff + "'";
  } else {
    document.getElementById("clock").innerText = "FT";
  }
}

/* 🎯 APPLY UI SAFELY */
function applyData(m) {
  document.getElementById("home").innerText = m.home ?? "—";
  document.getElementById("away").innerText = m.away ?? "—";
  document.getElementById("status").innerText = m.status ?? "LOADING";

  const homeScore = (m.homeScore ?? 0);
  const awayScore = (m.awayScore ?? 0);

  const score = `${homeScore} - ${awayScore}`;
  document.getElementById("score").innerText = score;

  /* ⚽ GOAL ANIMATION */
  if (lastScore && lastScore !== score) {
    const el = document.querySelector(".score");
    el.style.transform = "scale(1.3)";
    setTimeout(() => el.style.transform = "scale(1)", 300);
  }

  lastScore = score;

  /* ⏱️ CLOCK */
  const kickoff = new Date(m.utcDate);

  if (m.status === "LIVE" || m.status === "IN_PLAY") {
    updateClock(kickoff);
  } else if (m.status === "FINISHED") {
    document.getElementById("clock").innerText = "FT";
  } else {
    document.getElementById("clock").innerText = "0'";
  }
}

/* 🔄 SAFE FETCH LOOP (NO FLICKER / NO RACE CONDITION) */
async function loadMatch() {
  if (isUpdating) return;
  isUpdating = true;

  try {
    const res = await fetch("https://football-backend-2fmw.onrender.com/auto-match");
    const m = await res.json();

    /* ❌ BLOCK INVALID DATA */
    if (!m || !m.home || !m.away) {
      if (lastValidData) applyData(lastValidData);
      isUpdating = false;
      return;
    }

    lastValidData = m;
    applyData(m);

  } catch (e) {
    document.getElementById("status").innerText = "OFFLINE";

    if (lastValidData) {
      applyData(lastValidData);
    }
  }

  isUpdating = false;
}

/* 🚀 START */
loadMatch();
setInterval(loadMatch, 5000);
</script>

</body>
</html>
